<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>积木上海 · 城市板块</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'ZCOOL QingKe HuangYou', 'Press Start 2P', monospace;
      overflow: hidden;
      height: 100vh;
      background: #7ec8f8;
    }
    .plate {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
    }
    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #7ec8f8 0%, #b8e8ff 50%, #d8f4c0 100%);
      z-index: 0;
    }
    .cloud {
      position: absolute;
      background: #fff;
      border: 3px solid #2d2d2d;
      height: 20px;
      animation: drift 22s ease-in-out infinite;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border: inherit;
    }
    .cloud-1 { width: 56px; top: 10%; left: 8%; }
    .cloud-1::before { width: 24px; height: 18px; top: -10px; left: 6px; }
    .cloud-2 { width: 72px; top: 6%; right: 12%; animation-delay: -7s; }
    .cloud-2::before { width: 30px; height: 20px; top: -12px; left: 10px; }
    .cloud-3 { width: 48px; top: 16%; left: 45%; animation-delay: -14s; }
    @keyframes drift { 50% { transform: translateX(12px); } }

    .header {
      position: relative;
      z-index: 10;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 213, 0, 0.92);
      border-bottom: 4px solid #2d2d2d;
      box-shadow: 0 4px 0 #2d2d2d;
    }
    .header h1 { font-size: 1.4rem; letter-spacing: 0.1em; }
    .header span { font-size: 0.85rem; opacity: 0.7; flex: 1; text-align: center; }

    .map-wrap {
      flex: 1;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      overflow: auto;
      padding: 8px 16px 8px;
    }
    .map-frame {
      position: relative;
      border: 4px dashed rgba(45,45,45,0.3);
      padding: 24px 32px;
      border-radius: 4px;
    }
    .iso-world {
      position: relative;
      image-rendering: pixelated;
    }
    .iso-tile {
      position: absolute;
      width: 48px;
      height: 38px;
      cursor: pointer;
    }
    .iso-tile img { width: 48px; height: 38px; display: block; pointer-events: none; }
    .iso-tile:hover img { filter: brightness(1.12); }
    .iso-building {
      position: absolute;
      width: 48px;
      height: 32px;
      pointer-events: none;
      z-index: 20;
    }
    .iso-building img {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      image-rendering: pixelated;
    }
    .deco {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      image-rendering: pixelated;
    }
    .badge {
      position: absolute;
      z-index: 20;
      padding: 8px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #ffe8a0;
      background: rgba(28,32,52,0.88);
      border: 3px solid #6eb8ff;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
    }
    .badge-day { top: 56px; right: 16px; }
    .badge-map { bottom: 120px; left: 16px; width: 72px; }
    .minimap {
      height: 40px;
      background: repeating-linear-gradient(90deg,#3d9a40 0 6px,#c4a574 6px 8px);
      border: 2px solid #2d2d2d;
      margin-bottom: 4px;
    }
    .tooltip {
      position: fixed;
      z-index: 999;
      padding: 8px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #ffe8c8;
      background: rgba(25,30,48,0.95);
      border: 2px solid #6eb8ff;
      display: none;
      pointer-events: none;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    }
    .hud {
      position: relative;
      z-index: 30;
      padding: 0 12px 14px;
    }
    .hud-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: rgba(28,32,52,0.9);
      border: 3px solid #6eb8ff;
      border-radius: 8px;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.35);
    }
    .hud-lv {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #ffe566;
    }
    .xp {
      width: 70px;
      height: 10px;
      background: #1a1e30;
      border: 2px solid #2d2d2d;
      margin-left: 8px;
      display: inline-block;
      vertical-align: middle;
    }
    .xp-fill { height: 100%; background: #5cd848; width: 42%; }
    .money-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .coin {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg,#ffe566,#e8b800);
      border: 3px solid #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      box-shadow: 3px 3px 0 #2d2d2d;
    }
    .money-val { font-size: 1.3rem; color: #ffe566; text-shadow: 2px 2px 0 #2d2d2d; }
    .income { font-family: 'Press Start 2P', monospace; font-size: 8px; color: #5cd848; }
    .stats { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; justify-content: center; }
    .stat {
      padding: 6px 10px;
      border: 2px solid rgba(110,184,255,0.5);
      border-radius: 4px;
      font-size: 0.75rem;
      color: #9ab0c8;
      background: rgba(255,255,255,0.05);
    }
    .stat b {
      display: block;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #e8f0ff;
      margin-top: 2px;
    }
    .btns { display: flex; gap: 8px; }
    .pbtn {
      padding: 10px 18px;
      border: 3px solid #2d2d2d;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 4px 4px 0 #2d2d2d;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .pbtn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #2d2d2d; }
    .pbtn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #2d2d2d; }
    .pbtn-build { background: linear-gradient(180deg,#ffe566,#ffd500); }
    .pbtn-up { background: linear-gradient(180deg,#6eb8ff,#4da3ff); color: #fff; }
    .hint-corner {
      position: absolute;
      bottom: 130px;
      right: 16px;
      z-index: 15;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #6b5a45;
      max-width: 140px;
      line-height: 1.6;
      padding: 8px;
      background: rgba(255,255,255,0.5);
      border: 2px solid #2d2d2d;
    }
  </style>
</head>
<body>
  <div class="plate">
    <div class="sky" aria-hidden>
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
    </div>

    <header class="header">
      <h1>积木上海</h1>
      <span>城市板块 · 10×10 等距像素</span>
    </header>

    <div class="badge badge-day" id="dayBadge">Day 1</div>
    <div class="badge badge-map">
      <div class="minimap"></div>
      <span style="font-size:7px;display:block;text-align:center;color:#9ab">MAP</span>
    </div>
    <p class="hint-corner">悬停地块查看信息<br/>点击「建造」开始扩展城市</p>

    <div class="map-wrap">
      <div class="map-frame">
        <div id="decoLayer"></div>
        <div id="world" class="iso-world"></div>
      </div>
    </div>

    <footer class="hud">
      <div class="hud-panel">
        <div>
          <span class="hud-lv" id="lv">Lv.1</span>
          <span style="color:#ffd500">★</span>
          <span class="xp"><span class="xp-fill" id="xpBar"></span></span>
        </div>
        <div class="money-row">
          <div class="coin">¥</div>
          <div>
            <div class="money-val" id="money">¥420,543</div>
            <div class="income" id="income">+¥62/秒</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat">👥 人口<b id="pop">186</b></div>
          <div class="stat">⚡ 电力<b id="power">68%</b></div>
          <div class="stat">♥ 幸福<b id="happy">92</b></div>
          <div class="stat">🏪 商业<b id="biz">52</b></div>
        </div>
        <div class="btns">
          <button type="button" class="pbtn pbtn-build" id="btnBuild">建造</button>
          <button type="button" class="pbtn pbtn-up" id="btnUp">升级</button>
        </div>
      </div>
    </footer>
  </div>
  <div class="tooltip" id="tip"></div>

  <script>
(function () {
  const COLS = 10, ROWS = 10;
  const TW = 48, TH = 24;
  const state = {
    money: 420543,
    income: 62,
    level: 1,
    xp: 42,
    day: 1,
    pop: 186,
    power: 68,
    happy: 92,
    biz: 52,
  };

  function svgUrl(svg) {
    return 'data:image/svg+xml,' + encodeURIComponent(svg);
  }

  function isoBlock(top, left, right, stud) {
    const studs = stud
      ? '<circle cx="14" cy="10" r="3" fill="rgba(255,255,255,0.7)" stroke="#2d2d2d"/><circle cx="34" cy="10" r="3" fill="rgba(255,255,255,0.7)" stroke="#2d2d2d"/>'
      : '';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 38" width="48" height="38">
      <path d="M24 2 L46 14 L24 26 L2 14 Z" fill="${top}" stroke="#2d2d2d" stroke-width="2"/>
      <path d="M2 14 L24 26 L24 38 L0 26 Z" fill="${left}" stroke="#2d2d2d" stroke-width="2"/>
      <path d="M24 26 L46 14 L46 26 L24 38 Z" fill="${right}" stroke="#2d2d2d" stroke-width="2"/>${studs}</svg>`;
    return svgUrl(svg);
  }

  const TILES = {
    grass: isoBlock('#6ecf5a', '#4a9e3a', '#5bb848', true),
    road: isoBlock('#c4a574', '#9a7d52', '#b09062', false),
    stone: isoBlock('#d8dce8', '#a8acb8', '#c0c4d0', false),
  };

  /* 与 src/game/pixel-buildings.js 同风格的城市建筑 */
  const BLD_SIZE = { shikumen: [64, 84], rowhouse: [64, 88], shop: [64, 80], factory: [64, 88] };
  function bldSvg(type) {
    const m = {
      shikumen: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 84" width="64" height="84" shape-rendering="crispEdges"><ellipse cx="32" cy="80" rx="22" ry="4" fill="rgba(20,18,16,0.35)"/><path d="M32 28 L56 40 L32 52 L8 40 Z" fill="#5c4038" stroke="#1e1e1e" stroke-width="1.5"/><path d="M8 40 L32 52 L32 88 L8 76 Z" fill="#7a4a38" stroke="#1e1e1e" stroke-width="1.5"/><path d="M56 40 L32 52 L32 88 L56 76 Z" fill="#8f5a45" stroke="#1e1e1e" stroke-width="1.5"/><rect x="18" y="48" width="28" height="22" fill="#6b6560" stroke="#1e1e1e" stroke-width="1.5"/><rect x="24" y="54" width="16" height="14" fill="#3d2e24" stroke="#1e1e1e" stroke-width="1.5"/><rect x="12" y="42" width="5" height="5" fill="#4a5a64" stroke="#2a2a2a"/><rect x="19" y="42" width="5" height="5" fill="#6a7a82" stroke="#2a2a2a"/><rect x="40" y="44" width="5" height="5" fill="#4a5a64" stroke="#2a2a2a"/><path d="M14 28 L32 18 L50 28" fill="#4a3830" stroke="#1e1e1e" stroke-width="1.5"/></svg>`,
      rowhouse: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88" shape-rendering="crispEdges"><ellipse cx="32" cy="84" rx="24" ry="4" fill="rgba(20,18,16,0.35)"/><path d="M32 30 L58 43 L32 56 L6 43 Z" fill="#6b4a40" stroke="#1e1e1e" stroke-width="1.5"/><path d="M6 43 L32 56 L32 92 L6 79 Z" fill="#8b4a3a" stroke="#1e1e1e" stroke-width="1.5"/><path d="M58 43 L32 56 L32 92 L58 79 Z" fill="#a05848" stroke="#1e1e1e" stroke-width="1.5"/><rect x="44" y="28" width="8" height="18" fill="#5a5a5a" stroke="#1e1e1e"/><rect x="14" y="40" width="5" height="5" fill="#5a6a72" stroke="#2a2a2a"/><rect x="21" y="40" width="5" height="5" fill="#4a5a64" stroke="#2a2a2a"/><rect x="28" y="40" width="5" height="5" fill="#6a7a82" stroke="#2a2a2a"/><path d="M8 30 L32 16 L56 30" fill="#5c4840" stroke="#1e1e1e" stroke-width="1.5"/></svg>`,
      shop: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80" shape-rendering="crispEdges"><ellipse cx="32" cy="76" rx="24" ry="4" fill="rgba(20,18,16,0.35)"/><path d="M32 34 L56 46 L32 58 L8 46 Z" fill="#7a7570" stroke="#1e1e1e"/><path d="M8 46 L32 58 L32 86 L8 74 Z" fill="#9a9088" stroke="#1e1e1e"/><path d="M56 46 L32 58 L32 86 L56 74 Z" fill="#b0a898" stroke="#1e1e1e"/><rect x="12" y="52" width="40" height="6" fill="#6a3030" stroke="#1e1e1e"/><path d="M12 58 L32 50 L52 58 L50 64 L14 64 Z" fill="#7a4a42" stroke="#1e1e1e"/><rect x="14" y="42" width="5" height="5" fill="#4a5a64" stroke="#2a2a2a"/><rect x="21" y="42" width="5" height="5" fill="#6a7a82" stroke="#2a2a2a"/></svg>`,
      factory: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88" shape-rendering="crispEdges"><ellipse cx="32" cy="84" rx="26" ry="4" fill="rgba(20,18,16,0.35)"/><path d="M32 38 L58 51 L32 64 L6 51 Z" fill="#4a4e54" stroke="#1e1e1e"/><path d="M6 51 L32 64 L32 100 L6 87 Z" fill="#5a5e66" stroke="#1e1e1e"/><path d="M58 51 L32 64 L32 100 L58 87 Z" fill="#6a6e76" stroke="#1e1e1e"/><rect x="40" y="24" width="10" height="28" fill="#6a5048" stroke="#1e1e1e"/><rect x="12" y="54" width="5" height="5" fill="#3a4248" stroke="#2a2a2a"/><rect x="19" y="54" width="5" height="5" fill="#4a5258" stroke="#2a2a2a"/><ellipse cx="45" cy="6" rx="5" ry="3" fill="#8a8a8a" opacity="0.5"/></svg>`,
      tree: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" width="24" height="32" shape-rendering="crispEdges"><rect x="10" y="20" width="4" height="10" fill="#5a4030" stroke="#1e1e1e"/><ellipse cx="12" cy="12" rx="9" ry="10" fill="#3a6a38" stroke="#1e1e1e"/></svg>`,
      lamp: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 36" width="16" height="36" shape-rendering="crispEdges"><rect x="6" y="12" width="4" height="22" fill="#4a4a4a" stroke="#1e1e1e"/><rect x="2" y="4" width="12" height="10" fill="#c8b060" stroke="#1e1e1e"/></svg>`,
    };
    return svgUrl(m[type] || m.shikumen);
  }

  function generateMap() {
    const tiles = [];
    for (let r = 0; r < ROWS; r++) {
      let row = '';
      for (let c = 0; c < COLS; c++) {
        if (c === 0 || r === 0 || c === COLS - 1 || r === ROWS - 1) row += '1';
        else if (c === 5 || r === 5) row += (c + r) % 2 === 0 ? '1' : '0';
        else if ((c + r) % 6 === 0) row += '2';
        else row += '0';
      }
      tiles.push(row);
    }
    return tiles;
  }

  const BUILDINGS = [
    [2, 2, 'shikumen'], [4, 3, 'shop'], [6, 2, 'factory'],
    [3, 5, 'rowhouse'], [7, 4, 'shop'], [5, 7, 'factory'], [8, 6, 'shikumen'],
  ];

  const tiles = generateMap();
  const LABELS = { 0: '草地', 1: '土路', 2: '石板' };

  function gridToScreen(col, row) {
    const ox = ((COLS - 1) * TW) / 2;
    const oy = 20;
    return {
      left: (col - row) * (TW / 2) + ox,
      top: (col + row) * (TH / 2) + oy,
      z: col + row,
    };
  }

  const world = document.getElementById('world');
  const deco = document.getElementById('decoLayer');
  const tip = document.getElementById('tip');
  const w = COLS * TW;
  const h = (COLS + ROWS) * TH + 100;
  world.style.width = w + 'px';
  world.style.height = h + 'px';

  [['tree', '4%', '55%'], ['tree', '8%', '62%'], ['lamp', '90%', '58%'], ['lamp', '6%', '48%'], ['tree', '88%', '65%']].forEach(([t, l, b]) => {
    const img = document.createElement('img');
    img.className = 'deco';
    img.src = bldSvg(t);
    img.style.left = l;
    img.style.bottom = b;
    img.alt = '';
    deco.appendChild(img);
  });

  const list = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const ch = tiles[r][c];
      const type = ch === '1' ? 'road' : ch === '2' ? 'stone' : 'grass';
      list.push({ c, r, type, z: c + r });
    }
  list.sort((a, b) => a.z - b.z);

  list.forEach(({ c, r, type }) => {
    const pos = gridToScreen(c, r);
    const el = document.createElement('div');
    el.className = 'iso-tile';
    el.style.cssText = `left:${pos.left}px;top:${pos.top}px;z-index:${pos.z}`;
    const img = document.createElement('img');
    img.src = TILES[type];
    img.alt = '';
    el.appendChild(img);
    el.addEventListener('mouseenter', (e) => {
      tip.style.display = 'block';
      tip.textContent = `(${c},${r}) ${LABELS[tiles[r][c]] || type}`;
      tip.style.left = e.clientX + 12 + 'px';
      tip.style.top = e.clientY + 12 + 'px';
    });
    el.addEventListener('mousemove', (e) => {
      tip.style.left = e.clientX + 12 + 'px';
      tip.style.top = e.clientY + 12 + 'px';
    });
    el.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    world.appendChild(el);
  });

  BUILDINGS.sort((a, b) => a[0] + a[1] - (b[0] + b[1])).forEach(([c, r, type]) => {
    const pos = gridToScreen(c, r);
    const sz = BLD_SIZE[type] || [64, 84];
    const el = document.createElement('div');
    el.className = 'iso-building';
    el.style.cssText = `left:${pos.left - 8}px;top:${pos.top - (sz[1] - 36)}px;z-index:${pos.z + 10}`;
    const img = document.createElement('img');
    img.src = bldSvg(type);
    img.width = sz[0];
    img.height = sz[1];
    img.style.imageRendering = 'pixelated';
    el.appendChild(img);
    world.appendChild(el);
  });

  function fmt(n) {
    return '¥' + Math.floor(n).toLocaleString('zh-CN');
  }

  function refreshHud() {
    document.getElementById('money').textContent = fmt(state.money);
    document.getElementById('income').textContent = '+' + fmt(state.income) + '/秒';
    document.getElementById('pop').textContent = state.pop;
    document.getElementById('power').textContent = state.power + '%';
    document.getElementById('happy').textContent = state.happy;
    document.getElementById('biz').textContent = state.biz;
    document.getElementById('xpBar').style.width = state.xp + '%';
    document.getElementById('dayBadge').textContent = 'Day ' + state.day;
  }

  refreshHud();
  setInterval(() => {
    state.money += state.income;
    state.pop += Math.random() > 0.7 ? 1 : 0;
    refreshHud();
  }, 1000);

  document.getElementById('btnBuild').onclick = () => {
    alert('建造面板：在 Vite 版中可拖拽积木到草地格上建造。');
  };
  document.getElementById('btnUp').onclick = () => {
    state.xp = Math.min(100, state.xp + 8);
    if (state.xp >= 100) {
      state.level++;
      state.xp = 10;
      document.getElementById('lv').textContent = 'Lv.' + state.level;
    }
    refreshHud();
  };
})();
  </script>
</body>
</html>
